# 🏷 Название — отображается в GitHub Actions
name: Django Full CI/CD Pipeline

# Когда запускать: при пуше или Pull Request в любые ветки
on:
  push:
    branches: [ "main", "master", "develop", "feature/task8"]
  pull_request:
    branches: [ "main", "master", "develop" ]

#Альтернатива, если не важно с какими ветками происходят манипуляции
#on:
#  push:
#  pull_request:


jobs:

  # ───────────────────────────────────────
  #  1. ЛИНТЕР: flake8 (работает и с pip, и с Poetry)
  # ───────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name:  Checkout кода
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ─── ОСНОВНОЙ ВАРИАНТ: Poetry ─────────────────────
      - name: Установить Poetry
        run: pip install poetry

      - name: Установить зависимости через Poetry
        run: poetry install --no-interaction

      - name: Проверить код с flake8
        run: poetry run flake8 .

      - name: Проверить форматирование с black
        run: poetry run black --check .

      # ─── АЛЬТЕРНАТИВА: pip (закомментирована для сравнения) ───
      # - name: Установить flake8 через pip
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install flake8
      #
      # - name:  Запустить flake8 через pip
      #   run: flake8 .


  # ───────────────────────────────────────
  #  2. ТЕСТЫ: Django (зависит от линтера)
  # ───────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

#      redis:
#        image: redis:7
#        ports:
#          - 6379:6379
#        options: >-
#          --health-cmd "redis-cli ping"
#          --health-interval 10s
#          --health-timeout 5s
#          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name:  Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Кэшировать зависимости Poetry
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Установить Poetry
        run: pip install poetry

      - name: Установить зависимости
        run: poetry install --no-interaction

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for PostgreSQL..."
          sleep 1
          done

#      - name: Wait for Redis
#        run: |
#          until redis-cli -h localhost -p 6379 ping | grep -q "PONG"; do
#            echo "Waiting for Redis..."
#            sleep 1
#          done

      - name: Применить миграции и Запустить тесты
        env:
          SECRET_KEY: test123
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
        run: |
          poetry run python manage.py migrate --noinput
          poetry run python manage.py test
          


      # ─── PIP (закомментирован) ────────────────────────
      # - name: Кэшировать pip
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      #     restore-keys: |
      #       ${{ runner.os }}-pip-
      #
      # - name:  Установить зависимости через pip
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt
      #
      # - name: 🗃 Миграции (pip)
      #   run: python manage.py migrate --noinput
      #
      # - name: Тесты (pip)
      #   run: python manage.py test


  # ───────────────────────────────────────
  # 3. БЕЗОПАСНОСТЬ: проверка уязвимостей
  # ───────────────────────────────────────
  security:
    needs: lint  # можно запускать параллельно с test
    runs-on: ubuntu-latest
    steps:
      - name:  Checkout
        uses: actions/checkout@v4

      - name:  Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ─── POETRY ───────────────────────────────────────
      - name: Установить Poetry + safety
        run: |
          pip install poetry safety

      - name: Установить зависимости
        run: poetry install --no-interaction

      - name: Проверить уязвимости
        run: poetry run safety check --full-report


      # ─── PIP (альтернатива) ───────────────────────────
      # - name: Установить safety через pip
      #   run: pip install safety
      #
      # - name: 🛡 Проверить через pip
      #   run: safety check -r requirements.txt --full-report


  # ───────────────────────────────────────
  # 4. ДЕПЛОЙ ПО SSH (основной способ без Docker)
  # ───────────────────────────────────────
  deploy-ssh:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Настроить SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SECRET_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            ls 
            cd ${{ secrets.DEPLOY_DIR }} # в этой переменной находится путь: /home/test/Progect_Django_rest_HW/
            git pull

            # Установить Poetry, если нужно
            if ! command -v poetry &> /dev/null; then
              sudo apt install poetry
              poetry config virtualenvs.in-project true
            fi

            # Установить зависимости и обновить приложение
            poetry install --no-interaction
            poetry run python manage.py migrate --noinput
            poetry run python manage.py collectstatic --noinput



            sudo docker compose down || true
            sudo docker compose up -d --build

